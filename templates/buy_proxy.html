<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Купить прокси — TG Lead Wareon</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body class="page-dark">
<header class="site-header">
    <div class="container header-inner">
        <a href="{{ url_for('index') }}" class="logo">
            <span class="logo-mark">TG</span>
            <span class="logo-text">Lead Wareon</span>
        </a>
        <nav class="nav-main">
            <a href="{{ url_for('dashboard') }}">Кабинет</a>
        </nav>
        <div class="header-actions">
            <a href="{{ url_for('logout') }}" class="btn btn-ghost btn-sm">Выйти</a>
        </div>
    </div>
</header>

<main class="section">
    <div class="container" style="max-width:500px;margin:0 auto;">
        <div class="glass" style="padding:24px;border-radius:18px;">
            <h2 style="margin-bottom:8px;">Купить прокси</h2>
            <p style="color:var(--text-muted);font-size:14px;margin-bottom:20px;">
                Готовые прокси для Telegram. Мгновенная выдача после оплаты.
            </p>
            
            <div class="summary-cards" style="margin-bottom:16px;">
                <div class="summary-card">
                    <div class="label">В наличии</div>
                    <div class="value">{{ available_count }}</div>
                    <div class="sub">шт.</div>
                </div>
                <div class="summary-card">
                    <div class="label">Цена</div>
                    <div class="value">{{ price_per_proxy }}₽</div>
                    <div class="sub">за 1 шт.</div>
                </div>
            </div>

            <form method="POST" action="{{ url_for('buy_proxy_checkout') }}">
                <div class="field" style="margin-bottom:12px;">
                    <label>Количество</label>
                    <input name="quantity" type="number" value="1" min="1" max="{{ available_count }}" style="width:100%;">
                </div>
                <button type="submit" class="btn btn-primary btn-full">Купить</button>
            </form>
            
            <p style="font-size:11px;color:var(--text-muted);margin-top:12px;text-align:center;">
                Прокси добавляются в ваш аккаунт автоматически. Оплата через администратора.
            </p>
        </div>
    </div>
</main>
</body>
</html>
