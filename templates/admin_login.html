<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Вход в админ-панель — TG Lead Wareon</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body class="auth-page page-dark">
<div class="auth-wrapper">
    <div class="auth-card glass">
        <div style="text-align:center;margin-bottom:16px;">
            <span class="logo-mark" style="display:inline-block;">🔐</span>
        </div>
        <h1 style="text-align:center;">Админ-панель</h1>
        <p class="auth-subtitle" style="text-align:center;">Введите секретный ключ для доступа</p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div style="color:{% if category == 'error' %}#ff6b6b{% else %}#3be88c{% endif %};text-align:center;margin-bottom:12px;font-size:13px;">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST" class="auth-form">
            <div class="field">
                <label for="key">Секретный ключ</label>
                <input id="key" name="key" type="password" required placeholder="Введите ключ">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Войти</button>
        </form>
        <p class="auth-meta"><a href="{{ url_for('index') }}">← На главную</a></p>
    </div>
</div>
</body>
</html>
