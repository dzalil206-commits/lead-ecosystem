<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Колесо фортуны — TG Lead Wareon</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    .wheel-container { text-align:center; padding:40px 0; }
    .wheel-wrapper { position:relative; width:300px; height:300px; margin:0 auto 20px; }
    canvas { width:100%; height:100%; }
    .wheel-arrow { position:absolute; top:-15px; left:50%; transform:translateX(-50%); width:0; height:0; border-left:15px solid transparent; border-right:15px solid transparent; border-top:25px solid var(--accent); filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
    #spin-btn { font-size:16px; padding:14px 32px; }
    #result { margin-top:16px; font-size:18px; color:var(--accent-light); }
  </style>
</head>
<body class="page-dark">
<main class="section">
    <div class="container wheel-container">
        <h1>🎡 Колесо фортуны</h1>
        <p style="color:var(--text-muted);margin-bottom:24px;">Крутите и получите скидку на первый тариф!</p>
        <div class="wheel-wrapper">
            <div class="wheel-arrow"></div>
            <canvas id="wheel" width="300" height="300"></canvas>
        </div>
        <button id="spin-btn" class="btn btn-primary">Крутить</button>
        <div id="result"></div>
        <p style="font-size:12px;color:var(--text-muted);margin-top:12px;">Скидка действует 24 часа. Только для новых пользователей.</p>
    </div>
</main>
<script>
    const prizes = ['30%', '10%', '20%', '15%', '25%', '10%', '30%', '20%'];
    const colors = ['#d4a574', '#1a1a1a', '#c9956b', '#1a1a1a', '#e8c9a0', '#1a1a1a', '#d4a574', '#1a1a1a'];
    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const segments = prizes.length;
    const angle = (2 * Math.PI) / segments;
    let spinning = false;

    function drawWheel() {
        for (let i = 0; i < segments; i++) {
            ctx.beginPath();
            ctx.moveTo(150, 150);
            ctx.arc(150, 150, 150, i * angle, (i + 1) * angle);
            ctx.fillStyle = colors[i];
            ctx.fill();
            ctx.save();
            ctx.translate(150, 150);
            ctx.rotate(i * angle + angle / 2);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 16px Inter';
            ctx.fillText(prizes[i], 80, 6);
            ctx.restore();
        }
    }
    drawWheel();

    document.getElementById('spin-btn').addEventListener('click', () => {
        if (spinning) return;
        spinning = true;
        const random = Math.floor(Math.random() * segments);
        const spinAngle = 360 * 5 + random * (360 / segments);
        canvas.style.transition = 'transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99)';
        canvas.style.transform = `rotate(${spinAngle}deg)`;
        setTimeout(() => {
            document.getElementById('result').textContent = `🎉 Ваша скидка: ${prizes[random]}! Используйте код WHEEL${prizes[random].replace('%', '')} при оплате.`;
            spinning = false;
        }, 4200);
    });
</script>
</body>
</html>
