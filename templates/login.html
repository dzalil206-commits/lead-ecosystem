<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход — TG Lead Wareon</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="auth-page page-dark">
<div class="auth-wrapper">
    <div class="auth-card glass">
        <a href="/" class="logo auth-logo">
            <span class="logo-mark">TG</span>
            <span class="logo-text">Lead Wareon</span>
        </a>
        <h1>Вход в экосистему</h1>
        <p class="auth-subtitle">Продолжайте управлять Miner, Sender и нейрочаттингом из единого кабинета.</p>

        <form method="POST" action="/login" class="auth-form">
            <div class="field">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" required placeholder="you@example.com">
            </div>
            <div class="field">
                <label for="password">Пароль</label>
                <input id="password" name="password" type="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Войти</button>
        </form>

        <p class="auth-meta">
            Нет аккаунта?
            <a href="/register">Создать аккаунт</a>
        </p>
    </div>
</div>
</body>
</html>
