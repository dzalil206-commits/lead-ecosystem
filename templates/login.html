<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TG Lead Wareon — Вход</title>
  <link rel="stylesheet" href="{ url_for('static', filename='style.css') }" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body class="page-dark">
<header class="site-header">
  <div class="container header-inner">
    <a href="{ url_for('index') }" class="logo">
      <div class="logo-mark">TG</div>
      <div class="logo-text">TG Lead Wareon</div>
    </a>
    <nav class="nav-main">
      <a href="{ url_for('index') }">Главная</a>
      <a href="{ url_for('pricing') }">Тарифы</a>
      <a href="{ url_for('cases') }">Кейсы</a>
      <a href="{ url_for('blog') }">Блог</a>
      <a href="{ url_for('faq') }">FAQ</a>
      <a href="{ url_for('support') }">Поддержка</a>
    </nav>
    <div class="header-actions">
      <a href="{ url_for('login') }" class="btn btn-ghost btn-sm">Войти</a>
      <a href="{ url_for('register') }" class="btn btn-primary btn-sm">Регистрация</a>
    </div>
    <button class="nav-toggle" type="button" aria-label="Открыть меню"><span></span><span></span></button>
  </div>
</header>
<main>

<section class="auth-page">
  <div class="auth-wrapper">
    <div class="auth-card glass">
      <div class="auth-logo">
        <a href="{{ url_for('index') }}" class="logo">
          <div class="logo-mark">TG</div>
          <div class="logo-text">TG Lead Wareon</div>
        </a>
      </div>
      <h1>Вход в аккаунт</h1>
      <p class="auth-subtitle">Продолжайте работать с Miner, Sender и AI-нейроответчиком.</p>
      <form class="auth-form" method="post" action="{{ url_for('login') }}">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" required />
        </div>
        <div class="field">
          <label for="password">Пароль</label>
          <input id="password" name="password" type="password" placeholder="●●●●●●●●" required />
        </div>
        <button class="btn btn-primary btn-full btn-lg" style="margin-top:14px;" type="submit">Войти</button>
      </form>
      <p class="auth-meta">Нет аккаунта? <a href="{{ url_for('register') }}">Зарегистрироваться</a></p>
    </div>
  </div>
</section>

</main>
<footer class="site-footer">
  <div class="container footer-inner">
    <div>© {{ current_year or 2026 }} TG Lead Wareon. Все права защищены.</div>
    <div class="footer-links">
      <a href="{{ url_for('faq') }}">FAQ</a>
      <a href="{{ url_for('support') }}">Поддержка</a>
      <a href="{{ url_for('pricing') }}">Тарифы</a>
    </div>
  </div>
</footer>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
